name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Run shared module tests
        run: ./gradlew --no-daemon :shared:core:jvmTest :shared:source-api:jvmTest :shared:kavita-api:jvmTest :shared:storage:jvmTest :shared:download:jvmTest

      - name: Run Android unit tests
        run: ./gradlew --no-daemon :apps:android:testDebugUnitTest

      - name: Assemble Android debug
        run: ./gradlew --no-daemon :apps:android:assembleDebug
